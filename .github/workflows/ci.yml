name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        working-directory: ./backend
        run: migrate -path migrations -database "postgres://app:app@localhost:5432/app?sslmode=disable" up

      - name: Run unit tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
          JWT_SECRET: dev-secret-do-not-use-in-prod-xxxxxxxxxxxxxxxx
          FIREBASE_PROJECT_ID: demo-sns
        run: go test -v -cover ./...

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        working-directory: ./backend
        run: migrate -path migrations -database "postgres://app:app@localhost:5432/app?sslmode=disable" up

      - name: Start API Server
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
          JWT_SECRET: dev-secret-do-not-use-in-prod-xxxxxxxxxxxxxxxx
          FIREBASE_PROJECT_ID: demo-sns
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          CORS_ALLOWED_ORIGINS: http://localhost:5173
        run: |
          go build -o api-server ./cmd/server
          ./api-server &
          
          echo "Waiting for API server..."
          timeout 30 bash -c 'until curl -s http://localhost:8080/api/v1/healthz; do sleep 1; done'
          echo "API server is up!"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
