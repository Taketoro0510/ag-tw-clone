services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app

    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app?sslmode=disable
      JWT_SECRET: dev-secret-do-not-use-in-prod-xxxxxxxxxxxxxxxx
      FIREBASE_PROJECT_ID: cloudcode-sns-local
      FIREBASE_AUTH_EMULATOR_HOST: host.docker.internal:9099
      FIREBASE_STORAGE_EMULATOR_HOST: host.docker.internal:9199
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      RATE_LIMIT_POSTS_PER_MIN: "5"
      RATE_LIMIT_LIKES_PER_MIN: "30"
      RATE_LIMIT_GET_PER_MIN: "60"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
  go-mod-cache:
  go-build-cache:
