openapi: 3.0.0
info:
  description: This is a sample server for SNS App MVP.
  title: CloudCode SNS API
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
paths:
  /auth/sessions:
    post:
      description: Exchanges Firebase ID token for a custom JWT
      tags:
        - auth
      summary: Create a new session
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dto.CreateSessionRequest"
        description: ID Token
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.CreateSessionResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  /healthz:
    get:
      description: Returns server health status
      tags:
        - health
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /me:
    get:
      security:
        - BearerAuth: []
      description: Returns the currently authenticated user
      tags:
        - users
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  /posts:
    get:
      security:
        - BearerAuth: []
      description: Get global timeline
      tags:
        - posts
      summary: List posts
      parameters:
        - description: Limit
          name: limit
          in: query
          schema:
            type: integer
            default: 20
        - description: Cursor
          name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.PaginatedPostsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
    post:
      security:
        - BearerAuth: []
      description: Create a new post with text and optional media
      tags:
        - posts
      summary: Create a post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dto.CreatePostRequest"
        description: Post info
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.Post"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  "/posts/{id}":
    get:
      security:
        - BearerAuth: []
      description: Get post details
      tags:
        - posts
      summary: Get a post
      parameters:
        - description: Post ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.Post"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
    delete:
      security:
        - BearerAuth: []
      description: Delete own post
      tags:
        - posts
      summary: Delete a post
      parameters:
        - description: Post ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  "/posts/{id}/likes":
    post:
      security:
        - BearerAuth: []
      description: Like a post
      tags:
        - likes
      summary: Like a post
      parameters:
        - description: Post ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
    delete:
      security:
        - BearerAuth: []
      description: Unlike a post
      tags:
        - likes
      summary: Unlike a post
      parameters:
        - description: Post ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  "/users/{id}":
    get:
      security:
        - BearerAuth: []
      description: Returns user basic info
      tags:
        - users
      summary: Get a user by ID
      parameters:
        - description: User ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
  "/users/{id}/posts":
    get:
      security:
        - BearerAuth: []
      description: Get posts by a specific user
      tags:
        - users
      summary: List user posts
      parameters:
        - description: User ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Limit
          name: limit
          in: query
          schema:
            type: integer
            default: 20
        - description: Cursor
          name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.PaginatedPostsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dto.ErrorResponse"
servers:
  - url: //localhost:8080/api/v1
components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    dto.CreatePostRequest:
      type: object
      properties:
        body:
          type: string
        mediaPath:
          type: string
        mediaType:
          type: string
          enum:
            - image
            - video
    dto.CreateSessionRequest:
      type: object
      properties:
        idToken:
          type: string
    dto.CreateSessionResponse:
      type: object
      properties:
        token:
          type: string
    dto.ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    dto.ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/dto.ErrorDetail"
    dto.PaginatedPostsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/dto.Post"
        nextCursor:
          type: string
    dto.Post:
      type: object
      properties:
        authorId:
          type: string
        body:
          type: string
        createdAt:
          type: string
        id:
          type: string
        likeCount:
          type: integer
        likedByMe:
          type: boolean
        mediaPath:
          type: string
        mediaType:
          type: string
          enum:
            - image
            - video
        mediaUrl:
          type: string
    dto.User:
      type: object
      properties:
        avatarUrl:
          type: string
        createdAt:
          type: string
        displayName:
          type: string
        email:
          type: string
        firebaseUid:
          type: string
        id:
          type: string
        updatedAt:
          type: string
